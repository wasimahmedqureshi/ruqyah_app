<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruqyah Healing App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🕌 Ruqyah Healing</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="tabs">

<button onclick="showSection('ruqyah')">Ruqyah</button>
<button onclick="showSection('quran')">Quran</button>
<button onclick="showSection('evil')">Evil Eye</button>
<button onclick="showSection('tasbeeh')">Tasbeeh</button>

</div>

<!-- PLAYER -->

<div id="player">

<h2 id="title">Loading...</h2>

<audio id="audio"></audio>

<div class="controls">

<button onclick="prevTrack()">⏮</button>
<button onclick="playAudio()">▶</button>
<button onclick="pauseAudio()">⏸</button>
<button onclick="nextTrack()">⏭</button>

</div>

<input type="range" id="progress">

</div>

<!-- TASBEEH -->

<div id="tasbeeh" class="section">

<h2>📿 Digital Tasbeeh</h2>

<h1 id="count">0</h1>

<button onclick="increase()">+1</button>
<button onclick="reset()">Reset</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
